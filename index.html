<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>MAHIM OFFICIAL | Ghost Bot - FreeFire Ghost Joiner</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #0f0f23 100%);
            font-family: 'Poppins', sans-serif;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* Animated Background */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                repeating-linear-gradient(90deg, rgba(255,255,255,0.02) 0px, rgba(255,255,255,0.02) 1px, transparent 1px, transparent 100px),
                repeating-linear-gradient(0deg, rgba(255,255,255,0.02) 0px, rgba(255,255,255,0.02) 1px, transparent 1px, transparent 100px);
            pointer-events: none;
            z-index: 0;
        }

        /* Glowing Orbs */
        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.4;
            pointer-events: none;
            z-index: 0;
            animation: float 20s infinite ease-in-out;
        }

        .orb-1 { width: 400px; height: 400px; background: #667eea; top: -100px; left: -100px; }
        .orb-2 { width: 500px; height: 500px; background: #764ba2; bottom: -150px; right: -100px; animation-delay: -5s; }
        .orb-3 { width: 300px; height: 300px; background: #f093fb; top: 50%; left: 50%; transform: translate(-50%, -50%); animation-delay: -10s; opacity: 0.2; }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(30px, -30px) scale(1.05); }
            66% { transform: translate(-20px, 20px) scale(0.95); }
        }

        .container {
            position: relative;
            z-index: 10;
            max-width: 550px;
            margin: 0 auto;
        }

        /* Developer Card */
        .dev-card {
            background: linear-gradient(135deg, rgba(102,126,234,0.2), rgba(118,75,162,0.2));
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 25px 20px;
            margin-bottom: 25px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            position: relative;
            overflow: hidden;
        }

        .dev-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.08) 0%, transparent 70%);
            animation: rotate 15s linear infinite;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .dev-avatar {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 15px;
            font-size: 40px;
            box-shadow: 0 0 30px rgba(102,126,234,0.6);
            animation: glow 2s infinite;
        }

        @keyframes glow {
            0%, 100% { box-shadow: 0 0 20px rgba(102,126,234,0.4); }
            50% { box-shadow: 0 0 40px rgba(102,126,234,0.8); }
        }

        .dev-name {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, #fff, #a8c0ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        .official-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: linear-gradient(135deg, #1a5f7a, #0d3b4f);
            padding: 5px 15px;
            border-radius: 50px;
            font-size: 11px;
            font-weight: 600;
            margin: 10px 0;
            color: #fff;
            border: 1px solid rgba(255,215,0,0.5);
        }

        .official-badge i {
            font-size: 12px;
            color: #ffd700;
        }

        .telegram-link {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            background: linear-gradient(135deg, #0088cc, #006699);
            padding: 12px 30px;
            border-radius: 50px;
            text-decoration: none;
            color: white;
            font-weight: 600;
            margin-top: 10px;
            transition: all 0.3s;
            border: 1px solid rgba(255,255,255,0.2);
            font-size: 16px;
        }

        .telegram-link:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 25px rgba(0,136,204,0.5);
            background: linear-gradient(135deg, #00aaff, #0077aa);
        }

        .telegram-link i {
            font-size: 22px;
        }

        /* Main Card */
        .main-card {
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(15px);
            border-radius: 40px;
            padding: 35px 25px;
            border: 1px solid rgba(255,255,255,0.15);
            box-shadow: 0 25px 45px rgba(0,0,0,0.3);
        }

        .ghost-icon {
            text-align: center;
            font-size: 70px;
            margin-bottom: 10px;
            filter: drop-shadow(0 0 20px rgba(102,126,234,0.5));
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .title {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .title h2 {
            font-size: 26px;
            font-weight: 700;
            background: linear-gradient(135deg, #fff, #c8b6ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .title p {
            font-size: 13px;
            opacity: 0.7;
            margin-top: 5px;
        }

        /* Form Styles */
        .input-group {
            margin-bottom: 25px;
        }

        .input-group label {
            display: flex;
            align-items: center;
            gap: 10px;
            color: rgba(255,255,255,0.9);
            font-weight: 500;
            margin-bottom: 10px;
            font-size: 14px;
        }

        .input-group label i {
            font-size: 18px;
            color: #667eea;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #667eea;
            font-size: 18px;
        }

        input {
            width: 100%;
            padding: 16px 16px 16px 48px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 20px;
            font-size: 16px;
            color: white;
            font-family: 'Poppins', sans-serif;
            transition: all 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
            background: rgba(255,255,255,0.15);
            box-shadow: 0 0 20px rgba(102,126,234,0.3);
        }

        input::placeholder {
            color: rgba(255,255,255,0.4);
        }

        /* Submit Button */
        .submit-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            border-radius: 25px;
            font-size: 18px;
            font-weight: 700;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            transition: all 0.3s;
            margin-top: 15px;
            font-family: 'Poppins', sans-serif;
        }

        .submit-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(102,126,234,0.4);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        .submit-btn i {
            font-size: 20px;
        }

        /* Response Section */
        .response-section {
            margin-top: 25px;
            border-radius: 20px;
            overflow: hidden;
            transition: all 0.3s;
        }

        .response-header {
            background: rgba(0,0,0,0.4);
            padding: 12px 18px;
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .response-header i {
            font-size: 18px;
        }

        .response-header span {
            font-size: 13px;
            font-weight: 500;
            letter-spacing: 1px;
        }

        .response-content {
            padding: 20px;
            background: rgba(0,0,0,0.3);
        }

        .response {
            display: none;
        }

        .response.success {
            display: block;
            border-left: 4px solid #2ecc71;
        }

        .response.error {
            display: block;
            border-left: 4px solid #e74c3c;
        }

        .response.loading {
            display: block;
            border-left: 4px solid #f39c12;
        }

        .response .status-icon {
            font-size: 48px;
            text-align: center;
            margin-bottom: 15px;
        }

        .response .status-title {
            font-size: 20px;
            font-weight: 700;
            text-align: center;
            margin-bottom: 15px;
        }

        .response .status-message {
            text-align: center;
            font-size: 14px;
            margin-bottom: 15px;
            line-height: 1.6;
        }

        .response .details {
            background: rgba(0,0,0,0.3);
            border-radius: 15px;
            padding: 15px;
            margin-top: 10px;
        }

        .response .detail-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            font-size: 13px;
        }

        .response .detail-row:last-child {
            border-bottom: none;
        }

        .response .detail-label {
            font-weight: 600;
            opacity: 0.7;
        }

        .response .detail-value {
            font-weight: 500;
            font-family: monospace;
        }

        .response.success .status-icon { color: #2ecc71; }
        .response.error .status-icon { color: #e74c3c; }
        .response.loading .status-icon { color: #f39c12; animation: spin 1s linear infinite; display: inline-block; }

        .response.success .status-title { color: #2ecc71; }
        .response.error .status-title { color: #e74c3c; }
        .response.loading .status-title { color: #f39c12; }

        .footer-credit {
            margin-top: 15px;
            text-align: center;
            font-size: 11px;
            color: rgba(255,255,255,0.4);
        }

        .footer-credit i {
            color: #e74c3c;
        }

        /* Features */
        .features {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .feature {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 11px;
            color: rgba(255,255,255,0.5);
        }

        .feature i {
            font-size: 12px;
            color: #667eea;
        }

        /* Status Footer */
        .status-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 20px;
            padding-top: 15px;
            border-top: 1px solid rgba(255,255,255,0.1);
            font-size: 12px;
            color: rgba(255,255,255,0.5);
        }

        .status-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #2ecc71;
            margin-right: 6px;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.5; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        /* Loading Animation */
        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid white;
            border-radius: 50%;
            border-top-color: transparent;
            animation: spin 0.6s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

    <div class="container">
        <!-- Developer Promo Card -->
        <div class="dev-card">
            <div class="dev-avatar">
                <i class="fas fa-crown"></i>
            </div>
            <div class="dev-name">MAHIM OFFICIAL</div>
            <div class="official-badge">
                <i class="fas fa-check-circle"></i> VERIFIED
            </div>
            <a href="https://t.me/mahim_offcial_143" target="_blank" class="telegram-link">
                <i class="fab fa-telegram"></i> JOIN OFFICIAL TELEGRAM
                <i class="fas fa-arrow-right"></i>
            </a>
        </div>

        <!-- Main Ghost Form -->
        <div class="main-card">
            <div class="ghost-icon">
                <i class="fas fa-ghost"></i>
            </div>
            <div class="title">
                <h2>GHOST JOINER SYSTEM</h2>
                <p>Join FreeFire Matches as Anonymous Ghost</p>
            </div>

            <div class="input-group">
                <label>
                    <i class="fas fa-user-astronaut"></i>
                    GHOST NAME
                </label>
                <div class="input-wrapper">
                    <i class="fas fa-tag"></i>
                    <input type="text" id="ghost-name" placeholder="Enter ghost name (e.g., MAHIM, KING, PRO)" value="MAHIM">
                </div>
            </div>

            <!-- 🔥 CHANGE HERE: Removed "/ ROOM CODE" - Now only "TEAM CODE" -->
            <div class="input-group">
                <label>
                    <i class="fas fa-code-branch"></i>
                    TEAM CODE
                </label>
                <div class="input-wrapper">
                    <i class="fas fa-hashtag"></i>
                    <input type="text" id="team-code" placeholder="Enter team code here">
                </div>
            </div>

            <button class="submit-btn" id="submit-btn">
                <i class="fas fa-paper-plane"></i>
                DEPLOY GHOST
                <i class="fas fa-ghost"></i>
            </button>

            <!-- Response Section -->
            <div class="response-section" id="responseSection" style="display: none;">
                <div class="response-header">
                    <i class="fas fa-terminal"></i>
                    <span>SYSTEM RESPONSE</span>
                </div>
                <div class="response-content">
                    <div id="response" class="response"></div>
                </div>
            </div>

            <div class="features">
                <div class="feature">
                    <i class="fas fa-check-circle"></i> 24/7 Active
                </div>
                <div class="feature">
                    <i class="fas fa-bolt"></i> Instant Join
                </div>
                <div class="feature">
                    <i class="fas fa-shield-alt"></i> Secure System
                </div>
                <div class="feature">
                    <i class="fas fa-globe"></i> Global Server
                </div>
            </div>

            <div class="status-footer">
                <span>
                    <span class="status-dot"></span> API ONLINE
                </span>
                <span>
                    <i class="fas fa-microchip"></i> v3.0
                </span>
                <span>
                    <i class="fas fa-crown" style="color: #ffd700;"></i> MAHIM
                </span>
            </div>
        </div>
        <div class="footer-credit">
            <i class="fas fa-heart"></i> Developed by MAHIM OFFICIAL | Premium Ghost Bot System <i class="fas fa-heart"></i>
        </div>
    </div>

    <script>
        // API Configuration
        const API_URL = 'http://203.18.158.191:8080';

        async function sendGhostRequest(teamCode, ghostName) {
            const url = `${API_URL}/ghost?teamcode=${encodeURIComponent(teamCode)}&ghost_name=${encodeURIComponent(ghostName)}`;
            
            try {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 30000);
                
                const response = await fetch(url, {
                    method: 'GET',
                    mode: 'cors',
                    headers: {
                        'Accept': 'application/json',
                    },
                    signal: controller.signal
                });
                
                clearTimeout(timeoutId);
                
                const data = await response.json();
                return { success: response.ok, data, statusCode: response.status };
                
            } catch (error) {
                if (error.name === 'AbortError') {
                    return { success: false, error: 'Request timeout - Server not responding', errorType: 'timeout' };
                }
                return { success: false, error: error.message, errorType: 'network' };
            }
        }

        function showResponse(result, ghostName, teamCode) {
            const responseDiv = document.getElementById('response');
            const responseSection = document.getElementById('responseSection');
            
            responseSection.style.display = 'block';
            
            if (result.success && result.data && result.data.status === 'success') {
                const resData = result.data;
                const finalGhostName = resData.ghost_name || ghostName;
                const finalTeamCode = resData.teamcode || teamCode;
                const finalResult = resData.result || 'Ghost successfully joined the match';
                const timestamp = new Date().toLocaleString();
                
                responseDiv.className = 'response success';
                responseDiv.innerHTML = `
                    <div class="status-icon">
                        <i class="fas fa-check-circle"></i>
                    </div>
                    <div class="status-title">
                        DEPLOYMENT SUCCESSFUL
                    </div>
                    <div class="status-message">
                        Ghost has been successfully deployed to the match!
                    </div>
                    <div class="details">
                        <div class="detail-row">
                            <span class="detail-label"><i class="fas fa-user-astronaut"></i> Ghost Name:</span>
                            <span class="detail-value">${escapeHtml(finalGhostName)}</span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label"><i class="fas fa-code-branch"></i> Team Code:</span>
                            <span class="detail-value">${escapeHtml(finalTeamCode)}</span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label"><i class="fas fa-info-circle"></i> Status:</span>
                            <span class="detail-value" style="color: #2ecc71;">Active</span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label"><i class="fas fa-clock"></i> Timestamp:</span>
                            <span class="detail-value">${timestamp}</span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label"><i class="fas fa-flag-checkered"></i> Result:</span>
                            <span class="detail-value">${escapeHtml(finalResult)}</span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label"><i class="fas fa-crown"></i> Powered By:</span>
                            <span class="detail-value" style="color: #ffd700;">MAHIM OFFICIAL</span>
                        </div>
                    </div>
                `;
            } else if (result.success && result.data && result.data.status === 'error') {
                responseDiv.className = 'response error';
                responseDiv.innerHTML = `
                    <div class="status-icon">
                        <i class="fas fa-exclamation-triangle"></i>
                    </div>
                    <div class="status-title">
                        DEPLOYMENT FAILED
                    </div>
                    <div class="status-message">
                        ${escapeHtml(result.data.message || 'Something went wrong while deploying ghost')}
                    </div>
                    <div class="details">
                        <div class="detail-row">
                            <span class="detail-label"><i class="fas fa-user-astronaut"></i> Ghost Name:</span>
                            <span class="detail-value">${escapeHtml(ghostName)}</span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label"><i class="fas fa-code-branch"></i> Team Code:</span>
                            <span class="detail-value">${escapeHtml(teamCode)}</span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label"><i class="fas fa-clock"></i> Timestamp:</span>
                            <span class="detail-value">${new Date().toLocaleString()}</span>
                        </div>
                    </div>
                `;
            } else {
                let errorTitle = 'CONNECTION ERROR';
                let errorMessage = '';
                let errorIcon = '<i class="fas fa-plug"></i>';
                
                if (result.errorType === 'timeout') {
                    errorTitle = 'TIMEOUT ERROR';
                    errorMessage = 'Server is not responding. Please check if the API server is running at 203.18.158.191:8080';
                } else if (result.error?.includes('Failed to fetch') || result.error?.includes('NetworkError')) {
                    errorTitle = 'SERVER OFFLINE';
                    errorMessage = 'Cannot connect to API server. Make sure the server is running on 203.18.158.191:8080';
                    errorIcon = '<i class="fas fa-server"></i>';
                } else if (result.error?.includes('CORS')) {
                    errorTitle = 'CORS ERROR';
                    errorMessage = 'Cross-Origin Request blocked. Please enable CORS on the API server';
                    errorIcon = '<i class="fas fa-shield-alt"></i>';
                } else {
                    errorTitle = 'CONNECTION FAILED';
                    errorMessage = result.error || 'Unknown error occurred while connecting to server';
                    errorIcon = '<i class="fas fa-question-circle"></i>';
                }
                
                responseDiv.className = 'response error';
                responseDiv.innerHTML = `
                    <div class="status-icon">
                        ${errorIcon}
                    </div>
                    <div class="status-title">
                        ${errorTitle}
                    </div>
                    <div class="status-message">
                        ${escapeHtml(errorMessage)}
                    </div>
                    <div class="details">
                        <div class="detail-row">
                            <span class="detail-label"><i class="fas fa-network-wired"></i> API Server:</span>
                            <span class="detail-value">203.18.158.191:8080</span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label"><i class="fas fa-clock"></i> Attempt Time:</span>
                            <span class="detail-value">${new Date().toLocaleString()}</span>
                        </div>
                        ${result.error ? `<div class="detail-row">
                            <span class="detail-label"><i class="fas fa-bug"></i> Details:</span>
                            <span class="detail-value" style="color: #e74c3c;">${escapeHtml(result.error.substring(0, 100))}</span>
                        </div>` : ''}
                    </div>
                `;
            }
            
            // Scroll to response
            responseSection.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }

        function showLoading() {
            const responseDiv = document.getElementById('response');
            const responseSection = document.getElementById('responseSection');
            
            responseSection.style.display = 'block';
            responseDiv.className = 'response loading';
            responseDiv.innerHTML = `
                <div class="status-icon">
                    <i class="fas fa-spinner"></i>
                </div>
                <div class="status-title">
                    DEPLOYING GHOST
                </div>
                <div class="status-message">
                    Connecting to server and deploying ghost...
                </div>
                <div class="details">
                    <div class="detail-row">
                        <span class="detail-label"><i class="fas fa-spinner fa-pulse"></i> Status:</span>
                        <span class="detail-value">Processing request...</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label"><i class="fas fa-clock"></i> Started at:</span>
                        <span class="detail-value">${new Date().toLocaleString()}</span>
                    </div>
                </div>
            `;
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        const submitBtn = document.getElementById('submit-btn');
        const ghostNameInput = document.getElementById('ghost-name');
        const teamCodeInput = document.getElementById('team-code');

        submitBtn.addEventListener('click', async () => {
            const ghostName = ghostNameInput.value.trim();
            const teamCode = teamCodeInput.value.trim();

            if (!teamCode) {
                showResponse({ success: true, data: { status: 'error', message: 'Please enter Team Code!' } }, ghostName, teamCode);
                teamCodeInput.focus();
                return;
            }

            if (!ghostName) {
                showResponse({ success: true, data: { status: 'error', message: 'Please enter Ghost Name!' } }, ghostName, teamCode);
                ghostNameInput.focus();
                return;
            }

            // Show loading state
            showLoading();
            
            // Disable button
            const originalText = submitBtn.innerHTML;
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span class="loading-spinner"></span> PROCESSING...';

            // Make API call
            const result = await sendGhostRequest(teamCode, ghostName);
            
            // Show response
            showResponse(result, ghostName, teamCode);

            // Re-enable button
            submitBtn.disabled = false;
            submitBtn.innerHTML = originalText;
        });

        // Enter key support
        teamCodeInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') submitBtn.click();
        });
        ghostNameInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') submitBtn.click();
        });
    </script>
</body>
</html>
